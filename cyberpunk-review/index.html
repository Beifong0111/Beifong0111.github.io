<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cyberpunk Review</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; font-family: Inter, "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #221133, #090b14 45%, #04060a 100%);
      color: #f4f7fb;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 56px; }
    h1 { margin: 0 0 8px; font-size: 32px; }
    p { margin: 0 0 24px; color: #b9c0d0; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px;
    }
    .card {
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,.28);
    }
    img { display:block; width:100%; height:auto; }
    .meta { padding: 14px 16px 18px; }
    .tag {
      display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px;
      background: linear-gradient(90deg, #00d2ff, #ff2fb3); color:#fff; margin-bottom:10px;
    }
    .name { font-size: 18px; font-weight: 700; margin: 0 0 6px; }
    .desc { font-size: 14px; line-height: 1.6; color: #c9d2e3; margin: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>赛博朋克人物预览</h1>
    <p>本地 ComfyUI 生成测试图：女佣兵角色首轮结果。</p>
    <div class="grid">
      <article class="card">
        <img src="images/female_mercenary_00001.png" alt="female mercenary 1" />
        <div class="meta">
          <div class="tag">Version 01</div>
          <div class="name">夜城女佣兵</div>
          <p class="desc">短发、左眼义眼、战术夹克、冷色霓虹雨夜街头。</p>
        </div>
      </article>
      <article class="card">
        <img src="images/female_mercenary_00002.png" alt="female mercenary 2" />
        <div class="meta">
          <div class="tag">Version 02</div>
          <div class="name">夜城女佣兵</div>
          <p class="desc">同角色另一版本，保留霓虹、潮湿街景与义体气质。</p>
        </div>
      </article>
    </div>
  </div>
</body>
</html>
