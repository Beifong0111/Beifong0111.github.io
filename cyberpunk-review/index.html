<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cyberpunk Review</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family: Inter, "Microsoft YaHei", sans-serif; background: radial-gradient(circle at top, #25103c, #090b14 45%, #03050a 100%); color:#f4f7fb; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 18px 48px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:18px; }
    .card { background: rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:18px; overflow:hidden; box-shadow:0 12px 40px rgba(0,0,0,.28); }
    img { display:block; width:100%; height:auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <article class="card"><img src="images/female_mercenary_00001.png" alt="v1" /></article>
      <article class="card"><img src="images/female_mercenary_00002.png" alt="v2" /></article>
      <article class="card"><img src="images/female_mercenary_00003.png" alt="v3" /></article>
    </div>
  </div>
</body>
</html>
